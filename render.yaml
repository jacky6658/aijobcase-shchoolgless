services:
  - type: web
    name: edumind-ai
    runtime: node
    plan: free
    buildCommand: npm install && cd client && npm install --include=dev && cd ../server && npm install && cd .. && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
